<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativo e Operante!</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
<div class="container">
    <div id="globalAlert" class="alert"></div>
    <div id="loading" class="loading hidden"><i class="fas fa-spinner"></i> Carregando...</div>

    <!-- Login -->
    <div id="loginScreen">
        <div class="login-hero">
            <div class="brand-icon">
                <i class="fas fa-eye"></i>
            </div>
            <h1>Ativo e <span>Operante!</span></h1>
            <p>Sistema de Denúncias Cidadãs</p>
        </div>

        <div class="login-card">
            <h2><i class="fas fa-sign-in-alt"></i> Acessar sistema</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginSenha" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <hr>

            <p>Não tem conta? <a href="#" onclick="showRegister()">Cadastre-se</a></p>
        </div>
    </div>

    <!-- Cadastro -->
    <div id="registerScreen" class="hidden">
        <div class="login-hero">
            <div class="brand-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Criar <span>conta</span></h1>
            <p>Cadastro de cidadão</p>
        </div>

        <div class="login-card">
            <h2><i class="fas fa-id-card"></i> Seus dados</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>CPF</label>
                    <input type="text" id="registerCpf" placeholder="000.000.000-00" required
                           oninput="this.value = this.value.replace(/[^0-9]/g, '').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4')"
                           maxlength="14">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="registerSenha" placeholder="••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirmar senha</label>
                    <input type="password" id="registerConfirmSenha" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-primary">Criar conta</button>
            </form>

            <hr>

            <p>Já tem conta? <a href="#" onclick="showLogin()">Fazer login</a></p>
        </div>
    </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    function showLogin() {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('registerScreen').classList.add('hidden');
    }

    function showRegister() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('registerScreen').classList.remove('hidden');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('loginSenha').value;
        await login(email, senha);
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const cpf = document.getElementById('registerCpf').value.replace(/[^0-9]/g, '');
        const email = document.getElementById('registerEmail').value;
        const senha = document.getElementById('registerSenha').value;
        const confirmSenha = document.getElementById('registerConfirmSenha').value;

        if (senha !== confirmSenha) { showAlert('As senhas não coincidem!', 'error'); return; }
        if (cpf.length !== 11) { showAlert('CPF inválido!', 'error'); return; }

        await register(cpf, email, senha);
    });

    const savedToken = localStorage.getItem('token');
    const savedEmail = localStorage.getItem('userEmail');
    if (savedToken && savedEmail) {
        authToken = savedToken;
        userEmail = savedEmail;
        window.location.href = savedEmail === 'admin@pm.br' ? 'admin.html' : 'cidadao.html';
    }
</script>
</body>
</html>
