<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativo e Operante! — Administração</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="header">
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-eye"></i>
            <span>Ativo e <em>Operante!</em></span>
        </div>
        <div class="nav-links">
            <a onclick="mostrarSecaoAdmin('denuncias')"><i class="fas fa-database" style="font-size:.7rem;margin-right:4px"></i>Denúncias</a>
            <a onclick="mostrarSecaoAdmin('orgaos')"><i class="fas fa-building" style="font-size:.7rem;margin-right:4px"></i>Órgãos</a>
            <a onclick="mostrarSecaoAdmin('tipos')"><i class="fas fa-tags" style="font-size:.7rem;margin-right:4px"></i>Tipos</a>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt" style="margin-right:5px"></i>Sair</button>
        </div>
    </div>
</div>

<!-- Welcome banner -->
<div class="welcome-banner">
    <div class="welcome-banner-inner">
        <span>Painel administrativo —</span>
        <strong id="welcomeEmail"></strong>
        <span class="welcome-badge" style="background:rgba(240,68,56,.1);border-color:rgba(240,68,56,.2);color:#c0392b">
            <i class="fas fa-circle" style="font-size:.4rem"></i>Admin
        </span>
    </div>
</div>

<div class="container">
    <div id="globalAlert" class="alert"></div>
    <div id="loading" class="loading hidden"><i class="fas fa-spinner"></i><span>Carregando...</span></div>

    <div class="stats-grid" id="statsGrid"></div>

    <!-- Todas Denúncias -->
    <div id="secaoAdminDenuncias" class="secao-admin">
        <div class="card">
            <h2><i class="fas fa-database"></i> Todas as denúncias</h2>
            <div id="todasDenunciasList"></div>
        </div>
    </div>

    <!-- Órgãos -->
    <div id="secaoAdminOrgaos" class="secao-admin hidden">
        <div class="card">
            <h2><i class="fas fa-building"></i> Gerenciar órgãos</h2>
            <form id="formOrgao" style="display:flex;gap:.75rem;align-items:flex-end">
                <div class="form-group" style="flex:1;margin:0">
                    <label>Nome do órgão</label>
                    <input type="text" id="orgaoNome" placeholder="Ex: Secretaria de Infraestrutura" required>
                </div>
                <button type="submit" class="btn-primary" style="white-space:nowrap;height:42px">
                    <i class="fas fa-plus"></i> Adicionar
                </button>
            </form>
            <hr style="margin:1.5rem 0">
            <div id="orgaosList"></div>
        </div>
    </div>

    <!-- Tipos -->
    <div id="secaoAdminTipos" class="secao-admin hidden">
        <div class="card">
            <h2><i class="fas fa-tags"></i> Gerenciar tipos de problema</h2>
            <form id="formTipo" style="display:flex;gap:.75rem;align-items:flex-end">
                <div class="form-group" style="flex:1;margin:0">
                    <label>Nome do tipo</label>
                    <input type="text" id="tipoNome" placeholder="Ex: Iluminação pública, Buraco na via..." required>
                </div>
                <button type="submit" class="btn-primary" style="white-space:nowrap;height:42px">
                    <i class="fas fa-plus"></i> Adicionar
                </button>
            </form>
            <hr style="margin:1.5rem 0">
            <div id="tiposList"></div>
        </div>
    </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script>
    const savedToken = localStorage.getItem('token');
    const savedEmail = localStorage.getItem('userEmail');

    if (!savedToken || !savedEmail) {
        window.location.href = 'index.html';
    } else if (savedEmail !== 'admin@pm.br') {
        window.location.href = 'cidadao.html';
    } else {
        authToken = savedToken;
        userEmail = savedEmail;
        userNivel = 'administrador';
        document.getElementById('welcomeEmail').textContent = savedEmail;
        carregarDashboardAdmin();
    }
</script>
</body>
</html>
