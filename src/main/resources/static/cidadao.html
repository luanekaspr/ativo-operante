<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativo e Operante! - Área do Cidadão</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="header">
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-eye"></i>
            <span>Ativo e Operante! - Cidadão</span>
        </div>
        <div class="nav-links">
            <a onclick="mostrarSecao('novaDenuncia')">Nova Denúncia</a>
            <a onclick="mostrarSecao('minhasDenuncias')">Minhas Denúncias</a>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="globalAlert" class="alert"></div>
    <div id="loading" class="loading hidden"><i class="fas fa-spinner"></i> Carregando...</div>

    <!-- Nova Denúncia -->
    <div id="secaoNovaDenuncia" class="secao">
        <div class="card">
            <h2><i class="fas fa-exclamation-triangle"></i> Registrar Nova Denúncia</h2>
            <form id="formDenuncia">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="denunciaTitulo" required maxlength="100">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="denunciaDescricao" required></textarea>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="denunciaData" required>
                </div>
                <div class="form-group">
                    <label>Urgência (1 - Baixa a 5 - Muito Alta)</label>
                    <input type="range" id="denunciaUrgencia" min="1" max="5" value="3" oninput="updateUrgenciaValue(this.value)">
                    <span id="urgenciaValue">3</span>
                </div>
                <div class="form-group">
                    <label>Órgão Competente</label>
                    <select id="denunciaOrgao" required></select>
                </div>
                <div class="form-group">
                    <label>Tipo de Problema</label>
                    <select id="denunciaTipo" required></select>
                </div>
                <div class="form-group">
                    <label>Foto (Opcional)</label>
                    <input type="file" id="denunciaFoto" accept="image/*">
                </div>
                <button type="submit" class="btn-primary">Enviar Denúncia</button>
            </form>
        </div>
    </div>

    <!-- Minhas Denúncias -->
    <div id="secaoMinhasDenuncias" class="secao hidden">
        <div class="card">
            <h2><i class="fas fa-list"></i> Minhas Denúncias</h2>
            <div id="minhasDenunciasList"></div>
        </div>
    </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cidadao.js"></script>
<script>
    // Verificar autenticação
    const savedToken = localStorage.getItem('token');
    const savedEmail = localStorage.getItem('userEmail');

    if (!savedToken || !savedEmail) {
        window.location.href = 'index.html';
    } else if (savedEmail === 'admin@pm.br') {
        window.location.href = 'admin.html';
    } else {
        authToken = savedToken;
        userEmail = savedEmail;
        userNivel = 'cidadao';
        carregarDashboardCidadao();
    }
</script>
</body>
</html>
